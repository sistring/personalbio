<script>
(function() {
  var pathParts = window.location.pathname.split('/').filter(Boolean);
  var essayIndex = pathParts.indexOf('essay');
  var rawSlug = essayIndex >= 0 ? pathParts[essayIndex + 1] : null;
  var essaySlug = rawSlug ? rawSlug.replace(/\.html$/, '') : ('{{ include.essay_slug }}' || null);
  if (!essaySlug) return;

  var printBase = '{{ "/print/" | relative_url }}';
  var searchBase = '{{ "/search/" | relative_url }}';
  var bar = document.createElement('div');
  bar.className = 'essay-print-float';
  bar.innerHTML =
    '<a href="' + printBase + '?essay=' + essaySlug + '" aria-label="Print or save this essay as PDF" title="Print or save as PDF" target="_blank" rel="noopener">'
    + '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">'
    + '<path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/>'
    + '<path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2H5zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4V3zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2H5zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1z"/>'
    + '</svg><span>Print</span></a>'
    + '<a href="' + searchBase + '?essay=' + essaySlug + '" aria-label="Search this essay" title="Search">'
    + '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">'
    + '<path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>'
    + '</svg><span>Search</span></a>';
  document.body.appendChild(bar);

  window.addEventListener('scroll', function() {
    bar.classList.toggle('scrolled', window.scrollY > 80);
  }, { passive: true });
})();
</script>
